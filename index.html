<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yousra Mounib | From Complexity to Clarity</title>
<meta name="description" content="Yousra Mounib — Digital Transformation Specialist & Business Analyst. Co-founder & CEO/CTO of GapLens. 7+ years spanning telecom engineering, business analysis, and digital platforms.">
<meta name="theme-color" content="#07050A">
<link rel="icon" type="image/png" href="img/logo-ym.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
:root{
  --void:#07050A;
  --void-2:#0F0A14;
  --void-3:#150E1B;
  --ink:#F3ECEF;
  --ink-soft:#C9B8C2;
  --muted:#8C7A87;
  --signal:#E23F73;
  --signal-deep:#8A1F45;
  --signal-soft:rgba(226,63,115,.14);
  --resolve:#4EEAE0;
  --emerald:#2B6E4F;
  --emerald-soft:rgba(43,110,79,.16);
  --burgundy:#7A2440;
  --burgundy-soft:rgba(122,36,64,.16);
  --glass:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.10);
  --r:16px;
  --r-lg:26px;
  --maxw:1240px;
  --pad:clamp(20px,5vw,64px);
  --f-en:'Plus Jakarta Sans',system-ui,sans-serif;
  --f-serif:'Fraunces',Georgia,serif;
  --f-ar:'Tajawal',system-ui,sans-serif;
  --f-body:var(--f-en);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--void);color:var(--ink);font-family:var(--f-body);
  font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:clip;cursor:none;
}
@media (pointer:coarse){ body{cursor:auto} #cursorDot,#cursorRing{display:none} }
body.lang-ar{--f-body:var(--f-ar)}
body.lang-ar h1,body.lang-ar h2,body.lang-ar h3,body.lang-ar .serif{font-family:var(--f-ar)!important;font-style:normal!important}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::selection{background:var(--signal);color:#fff}
.wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad);position:relative;z-index:1}
.section{padding-block:clamp(70px,10vw,140px);position:relative}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:.78rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--signal)}
.eyebrow::before{content:"";width:24px;height:2px;background:currentColor;border-radius:2px}
[dir="rtl"] .eyebrow::before{content:none}
[dir="rtl"] .eyebrow::after{content:"";width:24px;height:2px;background:currentColor;border-radius:2px}
.serif{font-family:var(--f-serif);font-style:italic;font-weight:500;background:linear-gradient(90deg,var(--signal),var(--resolve));-webkit-background-clip:text;background-clip:text;color:transparent}
h1,h2,h3{font-family:var(--f-serif);font-weight:700;line-height:1.08;letter-spacing:-.02em;margin:0}
.h-sec{font-size:clamp(1.9rem,4vw,3rem);letter-spacing:-.03em}
.lead{font-size:clamp(1.02rem,1.5vw,1.2rem);color:var(--muted);max-width:60ch;line-height:1.6}
.sec-head{margin-bottom:56px}
.sec-head .lead{margin-top:14px}

/* custom cursor */
#cursorDot,#cursorRing{position:fixed;top:0;left:0;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cursorDot{width:6px;height:6px;background:var(--signal);transition:opacity .2s}
#cursorRing{width:34px;height:34px;border:1.5px solid var(--signal);transition:width .25s,height .25s,border-color .25s,background .25s,opacity .2s}
#cursorRing.hover{width:56px;height:56px;background:var(--signal-soft);border-color:var(--resolve)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:.55em;font-weight:700;font-size:.96rem;padding:.9em 1.7em;border-radius:100px;border:1px solid transparent;cursor:none;transition:transform .25s cubic-bezier(.2,.7,.3,1),background .25s,color .25s,border-color .25s,box-shadow .25s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--signal),var(--signal-deep));color:#fff;box-shadow:0 14px 30px -14px rgba(226,63,115,.6)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 40px -14px rgba(226,63,115,.8)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--glass-border)}
.btn-ghost:hover{border-color:var(--resolve);color:var(--resolve);transform:translateY(-2px)}
.btn-sm{padding:.6em 1.2em;font-size:.85rem}

/* ============ NAV ============ */
.nav{position:fixed;top:0;left:0;right:0;z-index:60;transition:background .3s,border-color .3s;border-bottom:1px solid transparent}
.nav.scrolled{background:rgba(7,5,10,.75);backdrop-filter:blur(16px) saturate(1.3);border-bottom-color:var(--glass-border)}
.nav-inner{max-width:var(--maxw);margin:0 auto;padding:16px var(--pad);display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:36px;height:36px;border-radius:8px;display:grid;place-items:center}
.brand-mark img{width:100%;height:100%;object-fit:contain;border-radius:8px;display:block}
.brand-mark-fallback{display:none;width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--signal),var(--resolve));align-items:center;justify-content:center;font-family:var(--f-serif);font-weight:700;font-size:1.05rem;color:var(--void)}
.brand b{font-family:var(--f-serif);font-weight:700;font-size:1.08rem}
body.lang-ar .brand b{font-family:var(--f-ar)}
.brand-tagline{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-top:1px}
body.lang-ar .brand-tagline{letter-spacing:0;text-transform:none}
.nav-links{display:flex;align-items:center;gap:26px}
.nav-links a{font-size:.92rem;font-weight:600;color:var(--ink-soft);position:relative;padding:4px 0}
.nav-links a::after{content:"";position:absolute;inset-inline-start:0;bottom:-2px;height:2px;width:0;background:var(--signal);transition:width .3s}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.mobile-menu a.active{color:var(--signal)}
.nav-right{display:flex;align-items:center;gap:10px}
.lang-btn{padding:0 14px;height:38px;border-radius:100px;border:1px solid var(--glass-border);background:transparent;color:var(--ink);font-weight:700;font-size:.8rem;cursor:none;letter-spacing:.03em;transition:.25s}
.lang-btn:hover{border-color:var(--signal);color:var(--signal)}
.burger{display:none;width:40px;height:40px;border:1px solid var(--glass-border);border-radius:50%;background:transparent;cursor:none;place-items:center;color:inherit}
.burger svg{width:18px;height:18px}
@media (max-width:900px){ .nav-links{display:none} .burger{display:grid} }

/* mobile menu */
.mobile-menu{position:fixed;inset:0;z-index:70;background:#050308;color:#fff;display:flex;flex-direction:column;justify-content:center;gap:6px;padding:90px var(--pad) 40px;transform:translateY(-100%);transition:transform .5s cubic-bezier(.7,0,.2,1);overflow-y:auto}
.mobile-menu.open{transform:translateY(0)}
.mobile-menu a{font-family:var(--f-serif);font-weight:700;font-size:clamp(1.7rem,8vw,2.4rem);padding:10px 0;border-bottom:1px solid var(--glass-border)}
body.lang-ar .mobile-menu a{font-family:var(--f-ar)}
.mm-close{position:absolute;top:20px;inset-inline-end:var(--pad);width:44px;height:44px;border-radius:50%;border:1px solid var(--glass-border);background:transparent;color:#fff;cursor:none;display:grid;place-items:center}

/* ============ HERO ============ */
.hero{position:relative;min-height:100svh;display:flex;align-items:center;padding-top:80px;overflow:hidden}
/* far-background cultural layer: a faint geometric star tessellation, kept well behind
   the particle field and never near text — see .hero .wrap z-index below */
.hero-pattern-layer{position:absolute;inset:-10%;z-index:-1;pointer-events:none}
/* two quiet corners of color in the ambient glow — muted green and burgundy, woven in
   as understated atmosphere rather than any redesign of the core signal/resolve palette */
.hero-pattern-layer::after{content:"";position:absolute;inset-inline-start:-10%;bottom:-15%;width:50%;height:60%;
  background:radial-gradient(circle,var(--emerald),transparent 70%);opacity:.5;filter:blur(60px)}
.hero-pattern-layer::before{content:"";position:absolute;inset-inline-end:-10%;top:-15%;width:45%;height:55%;
  background:radial-gradient(circle,var(--burgundy),transparent 70%);opacity:.4;filter:blur(60px)}
/* a faint abstract calligraphic stroke, drawn on scroll — gesture only, no literal text */
.hero-calligraphy{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.07}
.hero-calligraphy path{fill:none;stroke:url(#calligraphyGradient);stroke-width:2.4;stroke-linecap:round}
.hero-canvas{position:absolute;inset:0;z-index:0}
.hero .wrap{position:relative;z-index:2;width:100%;padding-block:40px 60px;text-align:center;display:flex;flex-direction:column;align-items:center}
.hero-badge{display:inline-flex;align-items:center;gap:10px;padding:8px 16px;border-radius:100px;background:var(--glass);border:1px solid var(--glass-border);font-size:.82rem;font-weight:600;margin-bottom:28px;backdrop-filter:blur(6px)}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 4px var(--signal-soft)}
.hero h1{font-size:clamp(2.6rem,7vw,5.2rem);line-height:1.05;letter-spacing:-.02em;max-width:16ch}
.hero-sub{margin-top:26px;font-size:clamp(1.02rem,1.6vw,1.3rem);color:var(--ink-soft);max-width:56ch;line-height:1.6}
.hero-cta{margin-top:38px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:center}

/* ============ ABOUT ============ */
.about-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(30px,5vw,70px);align-items:start}
.about-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-lg);padding:32px}
.about-card .av{width:156px;height:156px;border-radius:20px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--signal-deep),var(--void));display:grid;place-items:center;font-family:var(--f-serif);font-weight:700;font-size:1.4rem;color:var(--void);margin-bottom:20px}
.about-card .av img{width:100%;height:100%;object-fit:cover;object-position:center 70%;display:block}
.about-card .av-fallback{display:none}
.about-card h3{font-size:1.25rem}
.about-card p.role{color:var(--muted);font-size:.94rem;margin-top:6px}
.fact{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--glass-border)}
.fact:first-of-type{border-top:none;margin-top:18px}
.fact i{width:20px;color:var(--signal)}
.fact span{font-size:.9rem;color:var(--ink-soft)}
.about-copy p{margin:0 0 18px;color:var(--ink-soft);font-size:1.02rem;line-height:1.75}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.chip{background:var(--void-2);border:1px solid var(--glass-border);color:var(--ink-soft);font-size:.82rem;font-weight:600;padding:7px 14px;border-radius:100px}

/* ============ TIMELINE ============ */
.tl{position:relative;max-width:840px;margin:0 auto}
.tl::before{content:"";position:absolute;top:0;bottom:0;inset-inline-start:15px;width:2px;background:linear-gradient(var(--signal),var(--resolve))}
.tl-node{position:relative;padding-inline-start:50px;padding-bottom:52px;filter:blur(6px);opacity:0;transform:translateX(-14px)}
[dir="rtl"] .tl-node{transform:translateX(14px)}
.tl-node.in{filter:blur(0);opacity:1;transform:none;transition:filter .8s ease,opacity .8s ease,transform .8s ease}
.tl-node:last-child{padding-bottom:0}
.tl-node::before{content:"";position:absolute;inset-inline-start:6px;top:4px;width:20px;height:20px;border-radius:50%;background:var(--void);border:2px solid var(--signal);box-shadow:0 0 0 4px var(--signal-soft)}
.tl-node.current::before{background:var(--signal);box-shadow:0 0 0 6px var(--signal-soft),0 0 20px var(--signal)}
.tl-date{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--resolve)}
body.lang-ar .tl-date{letter-spacing:0;text-transform:none}
.tl-node h3{font-size:1.18rem;margin-top:6px}
.tl-org{font-size:.9rem;color:var(--muted);font-weight:600;margin-top:2px}
.tl-node p.desc{color:var(--ink-soft);font-size:.94rem;margin-top:10px;line-height:1.6;max-width:56ch}

/* ============ SKILLS CONSTELLATION ============ */
.skills-wrap{position:relative;max-width:920px;margin:0 auto}
#skillsSvg{width:100%;height:auto;overflow:visible}
.skill-wheel-outer{display:none}
@media (max-width:860px){
  .skills-wrap{display:none}
  .skill-wheel-outer{display:block}
  .skill-wheel{position:relative;perspective:1100px;height:340px;margin:0 auto;max-width:320px;touch-action:pan-y}
  .skill-wheel-ring{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.2,1);will-change:transform}
  .skill-wheel-ring.dragging{transition:none}
  .skill-wheel-face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
  .skill-wheel-face svg{width:100%;height:100%;overflow:visible}
  .skill-wheel-title{text-align:center;font-weight:800;font-size:1rem;margin-top:6px;color:var(--ink);font-family:var(--f-serif)}
  body.lang-ar .skill-wheel-title{font-family:var(--f-ar)}
  .skill-wheel-dots{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:14px}
  .skill-wheel-dot{width:7px;height:7px;border-radius:50%;background:var(--glass-border);transition:.3s;cursor:none;border:none;padding:0}
  .skill-wheel-dot.active{background:var(--signal);width:22px;border-radius:4px}
  .skill-wheel-hint{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 0 12px;font-size:.78rem;font-weight:600;color:var(--muted)}
  .skill-wheel-hint i{display:inline-block;color:var(--signal);animation:swipeHint 1.6s ease-in-out infinite}
  @keyframes swipeHint{0%,100%{transform:translateX(0);opacity:.55}50%{transform:translateX(-6px);opacity:1}}
}
.sk-edge{stroke:var(--glass-border);stroke-width:1;fill:none;transition:stroke .3s,stroke-width .3s,opacity .3s}
.sk-edge.lit{stroke:var(--signal);stroke-width:1.6;opacity:1}
.sk-node-circle{fill:var(--void-2);stroke:var(--glass-border);stroke-width:1.5;transition:.3s}
.sk-node.hot .sk-node-circle{stroke:var(--signal);fill:var(--signal-soft)}
.sk-node text{fill:var(--ink-soft);font-family:var(--f-en);font-size:11px;font-weight:600;transition:fill .3s}
.sk-hub{fill:var(--signal-soft);stroke:var(--signal);stroke-width:1.5}
body.lang-ar .sk-node text{font-family:var(--f-ar)}
.sk-node.hot text{fill:var(--ink)}
.sk-node{cursor:none}
.sk-cluster-label{fill:var(--muted);font-family:var(--f-en);font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
body.lang-ar .sk-cluster-label{font-family:var(--f-ar);letter-spacing:0;text-transform:none}

/* ============ PROJECTS ============ */
.featured-case{background:linear-gradient(150deg,var(--void-3),var(--void-2));border:1px solid var(--glass-border);border-radius:var(--r-lg);padding:clamp(28px,4vw,48px);display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;position:relative;overflow:hidden;margin-bottom:24px}
.featured-case::before{content:"";position:absolute;inset-inline-end:-15%;top:-30%;width:60%;height:140%;background:radial-gradient(circle,var(--signal),transparent 65%);opacity:.22;filter:blur(40px);pointer-events:none}
.featured-badge{display:inline-flex;align-items:center;gap:8px;font-size:.76rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--resolve);background:rgba(78,234,224,.1);border:1px solid rgba(78,234,224,.3);padding:6px 14px;border-radius:100px;margin-bottom:16px}
body.lang-ar .featured-badge{letter-spacing:0;text-transform:none}
.featured-case h3{font-size:clamp(1.6rem,2.6vw,2.2rem)}
.featured-case p{color:var(--ink-soft);margin-top:14px;line-height:1.7}
.featured-visual{aspect-ratio:4/3;border-radius:var(--r);background:linear-gradient(135deg,var(--signal-deep),var(--void));border:1px solid var(--glass-border);display:grid;place-items:center;position:relative;overflow:hidden;perspective:900px}
.featured-visual i{font-size:4rem;color:rgba(255,255,255,.9);transition:transform .15s ease-out}
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.case{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);overflow:hidden;cursor:none;transition:transform .1s ease-out,box-shadow .3s}
.case:hover{box-shadow:0 30px 60px -25px rgba(226,63,115,.35)}
.case-top{position:relative;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;overflow:hidden}
.case-top i{font-size:2.2rem;color:rgba(255,255,255,.9)}
.case-tag{position:absolute;top:12px;inset-inline-start:12px;background:rgba(7,5,10,.6);color:#fff;font-size:.68rem;font-weight:700;padding:5px 11px;border-radius:100px;backdrop-filter:blur(6px)}
.case-body{padding:20px 22px 22px}
.case-body h3{font-size:1.08rem;font-family:var(--f-en);font-weight:800}
body.lang-ar .case-body h3{font-family:var(--f-ar)}
.case-body p{color:var(--muted);font-size:.88rem;margin:8px 0 14px;line-height:1.5}
.case-tech{display:flex;flex-wrap:wrap;gap:6px}
.case-tech span{background:var(--void-2);border:1px solid var(--glass-border);color:var(--ink-soft);font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:100px}
.case-sublist{list-style:none;margin:0 0 14px;padding:0;display:flex;flex-direction:column;gap:6px}
.case-sublist li{position:relative;padding-inline-start:16px;font-size:.85rem;color:var(--ink-soft);line-height:1.4}
.case-sublist li::before{content:'';position:absolute;inset-inline-start:0;top:.55em;width:5px;height:5px;border-radius:50%;background:var(--signal)}
.case-sublist a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid transparent;transition:color .2s,border-color .2s}
.case-sublist a:hover{color:var(--signal);border-color:var(--signal)}

/* ============ MARKETING & CONTENT ============ */
/* deliberately distinct from Projects: emerald accent instead of signal/maroon,
   so visitors read this as a separate skill lane (content/marketing vs tech/business) */
.marketing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.case.marketing:hover{box-shadow:0 30px 60px -25px rgba(43,110,79,.4)}
.case.marketing .case-tag{background:rgba(43,110,79,.35);border:1px solid rgba(43,110,79,.5)}
.case.marketing .case-tech span{border-color:rgba(43,110,79,.35)}
@media (max-width:1040px){ .marketing-grid{grid-template-columns:repeat(2,1fr)} }
@media (max-width:640px){ .marketing-grid{grid-template-columns:1fr} }

/* client marquee — seamless loop, subtle and continuous */
.client-marquee{margin:8px 0 44px;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent)}
.client-marquee-track{display:flex;align-items:center;width:max-content;animation:marqueeScroll 46s linear infinite}
.client-marquee:hover .client-marquee-track{animation-play-state:paused}
@keyframes marqueeScroll{to{transform:translateX(-50%)}}
.client-word{display:flex;align-items:center;gap:16px;padding-inline-end:16px;font-family:var(--f-en);font-weight:700;font-size:1.02rem;color:var(--ink-soft);white-space:nowrap;opacity:.7;transition:opacity .3s,color .3s}
body.lang-ar .client-word{font-family:var(--f-ar)}
.client-word:hover{opacity:1;color:var(--ink)}
.client-word .tick{width:6px;height:6px;border-radius:2px;background:var(--emerald);flex-shrink:0;box-shadow:0 0 8px var(--emerald-soft)}
.hero .client-marquee{margin:52px 0 0;max-width:760px}
.hero .client-word .tick{background:var(--signal);box-shadow:0 0 8px var(--signal-soft)}

/* marketing services */
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
.service-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:24px;transition:transform .25s,border-color .25s,box-shadow .25s}
.service-card:hover{transform:translateY(-4px);border-color:rgba(43,110,79,.5);box-shadow:0 24px 50px -28px rgba(43,110,79,.4)}
.service-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;background:rgba(43,110,79,.16);border:1px solid rgba(43,110,79,.3);color:var(--emerald);margin-bottom:16px}
.service-card h3{font-size:1.04rem;margin-bottom:8px}
.service-card p{color:var(--muted);font-size:.9rem;line-height:1.55;margin:0}
@media (max-width:1040px){ .services-grid{grid-template-columns:repeat(2,1fr)} }
@media (max-width:640px){ .services-grid{grid-template-columns:1fr} }

/* ============ CONTACT ============ */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,6vw,80px);align-items:start}
.contact-info{margin-top:30px;display:flex;flex-direction:column;gap:2px}
.ci{display:flex;align-items:center;gap:15px;padding:15px 0;border-bottom:1px solid var(--glass-border)}
.ci .ci-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:var(--glass);border:1px solid var(--glass-border);flex-shrink:0;color:var(--signal)}
.ci span{display:block;font-size:.76rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
body.lang-ar .ci span{letter-spacing:0;text-transform:none}
.ci b{font-weight:700;font-size:1rem}
.form{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-lg);padding:clamp(24px,3.4vw,36px)}
.field{margin-bottom:16px}
.field label{display:block;font-size:.8rem;font-weight:700;margin-bottom:7px;color:var(--ink-soft)}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:12px;padding:13px 15px;color:#fff;font-family:inherit;font-size:.96rem}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--signal)}
.field textarea{resize:vertical;min-height:100px}
.field select option{color:#1a1a1a}
.form .btn{width:100%;justify-content:center;margin-top:4px}
.form-status{margin-top:14px;text-align:center;font-size:.88rem;font-weight:600}

/* ============ FOOTER ============ */
.footer{padding-block:44px 26px;border-top:1px solid var(--glass-border)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:.85rem}
.socials{display:flex;gap:10px}
.socials a{width:38px;height:38px;border-radius:50%;border:1px solid var(--glass-border);display:grid;place-items:center;color:var(--ink);transition:.25s;cursor:none}
.socials a:hover{background:var(--signal);color:#fff;border-color:var(--signal);transform:translateY(-3px)}

.gsap-reveal{opacity:0}

/* ============ page transitions ============ */
#main-content{transition:opacity .18s ease}
#main-content.fading{opacity:0}
/* ============ home quick links ============ */
.quick-links{margin-top:44px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:640px;width:100%}
.ql-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 10px;border-radius:var(--r);background:var(--glass);border:1px solid var(--glass-border);font-size:.82rem;font-weight:600;color:var(--ink-soft);cursor:none;transition:transform .25s,border-color .25s,color .25s}
.ql-card i{font-size:1.1rem;color:var(--signal)}
.ql-card:hover{transform:translateY(-4px);border-color:var(--signal);color:var(--ink)}
@media (max-width:640px){ .quick-links{grid-template-columns:repeat(2,1fr)} }

@media (max-width:1040px){
  .about-grid{grid-template-columns:1fr}
  .work-grid{grid-template-columns:repeat(2,1fr)}
  .featured-case{grid-template-columns:1fr}
}
@media (max-width:640px){
  body{font-size:16px}
  .work-grid{grid-template-columns:1fr}
  .contact-grid{grid-template-columns:1fr;gap:44px}
  .footer-bottom{flex-direction:column;align-items:flex-start;gap:12px}
  .brand{gap:9px}
  .brand b{font-size:.86rem;white-space:nowrap}
  .brand-tagline{font-size:.56rem;letter-spacing:.08em}
}
@media (max-width:380px){
  .brand b{font-size:.76rem}
  .brand-tagline{display:none}
}

/* ============ THREE.JS — hero particle field: noise -> structure ============ */
/* Wrapped as init/dispose so the WebGL scene is torn down cleanly when navigating
   away from Home and rebuilt when navigating back (avoids leaking WebGL contexts
   across repeated page visits). */
let heroScene = null;
function disposeHeroScene(){
  if (heroScene) { heroScene.dispose(); heroScene = null; }
}
function initHeroScene(){
  if (heroScene) return;
  const canvas = document.getElementById('heroCanvas');
  const hero = document.getElementById('hero');
  if (!window.THREE || !canvas || !hero) return;

  const isSmall = window.matchMedia('(max-width: 700px)').matches;
  const COUNT = isSmall ? 900 : 2200;

  function sizeOf(){
    const w = hero.clientWidth || window.innerWidth;
    const h = hero.clientHeight || window.innerHeight;
    return { w, h };
  }
  const initSize = sizeOf();

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, initSize.w / initSize.h, 0.1, 100);
  camera.position.z = 9;

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(initSize.w, initSize.h);

  const scatter = new Float32Array(COUNT * 3);
  const structured = new Float32Array(COUNT * 3);
  const colorScatter = new THREE.Color('#E23F73');
  const colorResolve = new THREE.Color('#4EEAE0');
  const colors = new Float32Array(COUNT * 3);

  for (let i = 0; i < COUNT; i++) {
    scatter[i*3] = (Math.random() - 0.5) * 14;
    scatter[i*3+1] = (Math.random() - 0.5) * 9;
    scatter[i*3+2] = (Math.random() - 0.5) * 8;

    const idx = i + 0.5;
    const phi = Math.acos(1 - 2 * idx / COUNT);
    const theta = Math.PI * (1 + Math.sqrt(5)) * idx;
    const radius = 3.4;
    structured[i*3] = radius * Math.sin(phi) * Math.cos(theta);
    structured[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
    structured[i*3+2] = radius * Math.cos(phi);

    colorScatter.toArray(colors, i*3);
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(scatter.slice(), 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: isSmall ? 0.05 : 0.045,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const points = new THREE.Points(geometry, material);
  const group = new THREE.Group();
  group.add(points);
  scene.add(group);

  // a quiet minority of particles resolve toward two muted tones instead of cyan —
  // never a flag shape, just color: a deep muted green and a dusty maroon woven
  // sparingly through the field alongside the core signal/resolve palette
  const colorAlgeria = new THREE.Color('#2B6E4F');
  const colorQatar = new THREE.Color('#7A2440');
  const tint = new Uint8Array(COUNT); // 0 = resolve cyan, 1 = Algeria green, 2 = Qatar maroon
  for (let i = 0; i < COUNT; i++) tint[i] = (i % 10 === 0) ? 1 : (i % 10 === 5) ? 2 : 0;

  let targetProgress = 0;
  let progress = 0;
  let mouseX = 0, mouseY = 0;
  let running = true;

  const calligraphyPath = document.getElementById('calligraphyPath');
  let calligraphyLen = 0;
  if (calligraphyPath) {
    calligraphyLen = calligraphyPath.getTotalLength();
    calligraphyPath.style.strokeDasharray = calligraphyLen;
    calligraphyPath.style.strokeDashoffset = calligraphyLen;
  }

  const onMouseMove = (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  };
  window.addEventListener('mousemove', onMouseMove);

  function updateProgressFromScroll(){
    const rect = hero.getBoundingClientRect();
    const vh = window.innerHeight;
    const raw = 1 - Math.max(0, Math.min(1, (rect.bottom) / (rect.height + vh)));
    targetProgress = Math.max(0, Math.min(1, raw * 1.6));
  }
  window.addEventListener('scroll', updateProgressFromScroll, { passive: true });
  updateProgressFromScroll();

  const posAttr = geometry.attributes.position;
  const colAttr = geometry.attributes.color;
  const tmpColor = new THREE.Color();

  function animate(){
    if (!running) return;
    requestAnimationFrame(animate);
    progress += (targetProgress - progress) * 0.04;

    for (let i = 0; i < COUNT; i++) {
      const ix = i*3, iy = i*3+1, iz = i*3+2;
      posAttr.array[ix] = scatter[ix] + (structured[ix] - scatter[ix]) * progress;
      posAttr.array[iy] = scatter[iy] + (structured[iy] - scatter[iy]) * progress;
      posAttr.array[iz] = scatter[iz] + (structured[iz] - scatter[iz]) * progress;
      const targetColor = tint[i] === 1 ? colorAlgeria : tint[i] === 2 ? colorQatar : colorResolve;
      tmpColor.copy(colorScatter).lerp(targetColor, progress);
      colAttr.array[ix] = tmpColor.r; colAttr.array[iy] = tmpColor.g; colAttr.array[iz] = tmpColor.b;
    }
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;

    group.rotation.y += 0.0012;
    group.rotation.x += (mouseY * 0.15 - group.rotation.x) * 0.03;
    group.rotation.y += (mouseX * 0.1) * 0.002;

    if (calligraphyPath && calligraphyLen) {
      calligraphyPath.style.strokeDashoffset = calligraphyLen * (1 - progress * 0.9);
    }

    renderer.render(scene, camera);
  }
  animate();

  function onResize(){
    const s = sizeOf();
    camera.aspect = s.w / s.h;
    camera.updateProjectionMatrix();
    renderer.setSize(s.w, s.h);
  }
  window.addEventListener('resize', onResize);
  // the first layout pass may not be settled yet when this script runs synchronously,
  // so re-measure once the browser has painted (and once more after full load) as a safety net
  requestAnimationFrame(onResize);
  window.addEventListener('load', onResize);

  const io = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      running = en.isIntersecting;
      if (running) animate();
    });
  }, { threshold: 0.01 });
  io.observe(hero);

  heroScene = {
    dispose(){
      running = false;
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('scroll', updateProgressFromScroll);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('load', onResize);
      io.disconnect();
      geometry.dispose();
      material.dispose();
      renderer.dispose();
    }
  };
}

window.renderSkills = function(){
  const svg = document.getElementById('skillsSvg');
  if (!svg) return;
  const lang = window.__lang || 'en';
  const data = SKILLS[lang];
  const cx = 450, cy = 280, clusterR = 380, nodeGap = 18;
  const nodeWidth = (label) => Math.max(60, label.length * 6.4 + 24);
  let html = '';
  const nodePositions = [];

  data.clusters.forEach((cluster, ci) => {
    const cAngle = (cluster.angle * Math.PI) / 180;
    const ccx = cx + Math.cos(cAngle) * clusterR;
    const ccy = cy + Math.sin(cAngle) * clusterR * 0.72;
    const perpAngle = cAngle + Math.PI / 2;
    const n = cluster.items.length;
    // content-aware 1D packing along the perpendicular axis so wide labels never overlap
    const widths = cluster.items.map(nodeWidth);
    const offsets = [0];
    for (let ii = 1; ii < n; ii++) {
      offsets.push(offsets[ii - 1] + widths[ii - 1] / 2 + nodeGap + widths[ii] / 2);
    }
    const centerShift = offsets[n - 1] / 2;
    cluster.items.forEach((item, ii) => {
      const offset = offsets[ii] - centerShift;
      const x = ccx + Math.cos(perpAngle) * offset;
      const y = ccy + Math.sin(perpAngle) * offset * 0.72;
      nodePositions.push({ x, y, label: item, cluster: ci });
    });
    const labelX = cx + Math.cos(cAngle) * (clusterR + 80);
    const labelY = cy + Math.sin(cAngle) * (clusterR + 80) * 0.72;
    html += `<text class="sk-cluster-label" x="${labelX}" y="${labelY}" text-anchor="middle">${cluster.name}</text>`;
  });

  // edges: connect nodes within the same cluster, and one bridge edge between adjacent clusters' first nodes
  let edgeHtml = '';
  const clusterStart = [];
  let running = 0;
  data.clusters.forEach(c => { clusterStart.push(running); running += c.items.length; });
  data.clusters.forEach((cluster, ci) => {
    const start = clusterStart[ci];
    for (let i = 0; i < cluster.items.length; i++) {
      for (let j = i+1; j < cluster.items.length; j++) {
        const a = nodePositions[start+i], b = nodePositions[start+j];
        edgeHtml += `<line class="sk-edge" data-a="${start+i}" data-b="${start+j}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"></line>`;
      }
    }
    const next = (ci + 1) % data.clusters.length;
    const a = nodePositions[clusterStart[ci]], b = nodePositions[clusterStart[next]];
    edgeHtml += `<line class="sk-edge" data-a="${clusterStart[ci]}" data-b="${clusterStart[next]}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"></line>`;
  });

  let nodeHtml = '';
  nodePositions.forEach((p, i) => {
    const w = nodeWidth(p.label);
    nodeHtml += `<g class="sk-node" data-index="${i}" transform="translate(${p.x},${p.y})">
      <rect class="sk-node-circle" x="${-w/2}" y="-16" width="${w}" height="32" rx="16"></rect>
      <text x="0" y="4" text-anchor="middle">${p.label}</text>
    </g>`;
  });

  svg.innerHTML = edgeHtml + nodeHtml + html;

  svg.querySelectorAll('.sk-node').forEach(node => {
    node.addEventListener('mouseenter', () => {
      const idx = node.dataset.index;
      node.classList.add('hot');
      svg.querySelectorAll(`.sk-edge[data-a="${idx}"], .sk-edge[data-b="${idx}"]`).forEach(e => e.classList.add('lit'));
    });
    node.addEventListener('mouseleave', () => {
      node.classList.remove('hot');
      svg.querySelectorAll('.sk-edge.lit').forEach(e => e.classList.remove('lit'));
    });
  });
};

/* ============ Skill wheel (mobile 3D carousel) ============ */
function wrapSkillLabel(label){
  if (label.length <= 15) return [label];
  const mid = Math.floor(label.length / 2);
  let splitAt = label.lastIndexOf(' ', mid);
  if (splitAt < 3) splitAt = label.indexOf(' ', mid);
  if (splitAt === -1) return [label];
  return [label.slice(0, splitAt), label.slice(splitAt + 1)];
}
function buildSkillFaceSVG(cluster){
  const size = 300, cx = size/2, cy = size/2, hubR = 34, spokeR = 118;
  const n = cluster.items.length;
  let edges = '', nodes = '';
  cluster.items.forEach((item, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI/2;
    const x = cx + Math.cos(angle) * spokeR;
    const y = cy + Math.sin(angle) * spokeR;
    edges += `<line class="sk-edge" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"></line>`;
    const lines = wrapSkillLabel(item);
    const maxLen = Math.max(...lines.map(l => l.length));
    const w = Math.max(64, maxLen * 5.8 + 20);
    const h = lines.length > 1 ? 38 : 26;
    const textY = lines.length > 1 ? -4 : 3;
    const tspans = lines.map((l, li) => `<tspan x="0" dy="${li === 0 ? 0 : 11}">${l}</tspan>`).join('');
    nodes += `<g class="sk-node" transform="translate(${x},${y})">
      <rect class="sk-node-circle" x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="${h/2}"></rect>
      <text x="0" y="${textY}" text-anchor="middle" font-size="9">${tspans}</text>
    </g>`;
  });
  const hub = `<circle class="sk-hub" cx="${cx}" cy="${cy}" r="${hubR}"></circle>`;
  return `<svg viewBox="0 0 ${size} ${size}">${edges}${hub}${nodes}</svg>`;
}
(function(){
  const outer = document.querySelector('.skill-wheel-outer');
  let n = 5, currentIndex = 0, radius = 0;
  function build(){
    const ring = document.getElementById('skillWheelRing');
    if (!ring) return;
    const lang = window.__lang || 'en';
    const clusters = SKILLS[lang].clusters;
    n = clusters.length;
    const faceSize = 300;
    radius = Math.round((faceSize/2) / Math.tan(Math.PI/n));
    ring.innerHTML = clusters.map((cluster, i) => {
      const angle = i * (360/n);
      return `<div class="skill-wheel-face" style="transform:rotateY(${angle}deg) translateZ(${radius}px)">${buildSkillFaceSVG(cluster)}</div>`;
    }).join('');
    currentIndex = 0;
    setAngle(0);
    updateDots();
    updateTitle();
  }
  function setAngle(deg){
    const ring = document.getElementById('skillWheelRing');
    if (ring) ring.style.transform = `rotateY(${deg}deg)`;
  }
  function updateTitle(){
    const title = document.getElementById('skillWheelTitle');
    if (!title) return;
    const lang = window.__lang || 'en';
    title.textContent = SKILLS[lang].clusters[currentIndex].name;
  }
  function updateDots(){
    const dots = document.getElementById('skillWheelDots');
    if (!dots) return;
    dots.innerHTML = Array.from({length:n}).map((_, i) =>
      `<button class="skill-wheel-dot${i===currentIndex?' active':''}" data-i="${i}" aria-label="Go to cluster ${i+1}"></button>`
    ).join('');
    dots.querySelectorAll('.skill-wheel-dot').forEach(dot => {
      dot.addEventListener('click', () => goTo(parseInt(dot.dataset.i, 10)));
    });
  }
  function goTo(index){
    currentIndex = ((index % n) + n) % n;
    const ring = document.getElementById('skillWheelRing');
    if (ring) { ring.classList.remove('dragging'); setAngle(-currentIndex * (360/n)); }
    updateDots();
    updateTitle();
  }
  let dragging = false, startX = 0, baseAngle = 0, liveAngle = 0;
  function dragStart(x){
    dragging = true;
    startX = x;
    baseAngle = -currentIndex * (360/n);
    liveAngle = baseAngle;
    const ring = document.getElementById('skillWheelRing');
    if (ring) ring.classList.add('dragging');
  }
  function dragMove(x){
    if (!dragging) return;
    const dx = x - startX;
    liveAngle = baseAngle + dx * 0.4;
    setAngle(liveAngle);
  }
  function dragEnd(){
    if (!dragging) return;
    dragging = false;
    goTo(Math.round(-liveAngle / (360/n)));
  }
  document.addEventListener('mousedown', (e) => { if (e.target.closest('#skillWheel')) dragStart(e.clientX); });
  document.addEventListener('mousemove', (e) => dragMove(e.clientX));
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchstart', (e) => { if (e.target.closest('#skillWheel')) dragStart(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('touchmove', (e) => { if (dragging) dragMove(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('touchend', dragEnd);
  window.renderSkillWheel = build;
  build();
})();

  {en:'QSTP', ar:'واحة قطر للعلوم والتكنولوجيا'},
  {en:'QRDI', ar:'QRDI'},
  {en:'QDB', ar:'بنك قطر للتنمية'},
  {en:'Ooredoo', ar:'أوريدو'},
  {en:'Vodafone', ar:'فودافون'},
  {en:'Ecosystem', ar:'إيكوسيستم'},
  {en:'DIC', ar:'حاضنة الأعمال الرقمية'},
  {en:'Ibtechar', ar:'ابتكار'},
  {en:'Be Creative', ar:'بي كرييتيف'}
];
function renderMarquee(containerId){
  const track = document.getElementById(containerId);
  if (!track) return;
  const lang = window.__lang || 'en';
  const words = CLIENTS.map(c => `<span class="client-word">${c[lang]}<span class="tick"></span></span>`).join('');
  track.innerHTML = words + words;
}

/* ============ Featured GapLens tilt ============ */
function bindFeaturedTilt(){
  const el = document.getElementById('featuredTilt');
  if (!el || el.dataset.tiltBound) return;
  el.dataset.tiltBound = '1';
  el.addEventListener('mousemove', (e) => {
    const r = el.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - .5;
    const py = (e.clientY - r.top) / r.height - .5;
    el.querySelector('i').style.transform = `translate(${px*16}px, ${py*16}px) scale(1.05)`;
  });
  el.addEventListener('mouseleave', () => { el.querySelector('i').style.transform = ''; });
}

/* ============ GSAP scroll reveals (re-bound per route, old triggers killed first) ============ */
function bindGsapReveals(){
  if (!window.gsap || !window.ScrollTrigger) return;
  gsap.registerPlugin(ScrollTrigger);
  ScrollTrigger.getAll().forEach(st => st.kill());
  gsap.utils.toArray('.gsap-reveal').forEach((el) => {
    gsap.set(el, { clearProps: 'all' });
    gsap.fromTo(el, { opacity: 0, y: 30 }, {
      opacity: 1, y: 0, duration: 0.9, ease: 'power3.out',
      scrollTrigger: { trigger: el, start: 'top 85%' }
    });
  });
}

/* ============ Timeline reveal ============ */
let tlIo = null;
function bindTimelineReveal(){
  if (tlIo) tlIo.disconnect();
  tlIo = new IntersectionObserver((entries) => {
    entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); tlIo.unobserve(en.target); } });
  }, { threshold: 0.3 });
  document.querySelectorAll('.tl-node').forEach(el => tlIo.observe(el));
}

/* ============ Contact form ============ */
function bindContactForm(){
  const form = document.getElementById('contactForm');
  if (!form || form.dataset.bound) return;
  form.dataset.bound = '1';
  const statusEl = document.getElementById('formStatus');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const lang = window.__lang || 'en';
    statusEl.style.color = '';
    statusEl.textContent = lang === 'ar' ? '// جارٍ الإرسال...' : '// Sending...';
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST', headers: { Accept: 'application/json' }, body: new FormData(form)
      });
      const result = await res.json();
      if (res.ok && result.success) {
        statusEl.style.color = 'var(--resolve)';
        statusEl.textContent = lang === 'ar' ? '// تم الإرسال بنجاح' : '// Message sent successfully';
        form.reset();
      } else {
        statusEl.style.color = '#ff9aa2';
        statusEl.textContent = (lang === 'ar' ? '// فشل الإرسال: ' : '// Failed: ') + (result.message || 'Unknown error');
      }
    } catch (err) {
      statusEl.style.color = '#ff9aa2';
      statusEl.textContent = lang === 'ar' ? '// خطأ في الشبكة' : '// Network error';
    }
  });
}

/* ============ Router — multi-page system ============ */
const PAGES = ['home','about','experience','skills','projects','marketing','contact'];
const PAGE_TITLES = {
  home: {en:'Yousra Mounib | From Complexity to Clarity', ar:'يسراء منيب | من التعقيد إلى الوضوح'},
  about: {en:'About | Yousra Mounib', ar:'نبذة | يسراء منيب'},
  experience: {en:'Journey | Yousra Mounib', ar:'المسيرة | يسراء منيب'},
  skills: {en:'Skills | Yousra Mounib', ar:'المهارات | يسراء منيب'},
  projects: {en:'Projects | Yousra Mounib', ar:'المشاريع | يسراء منيب'},
  marketing: {en:'Digital Marketing | Yousra Mounib', ar:'التسويق الرقمي | يسراء منيب'},
  contact: {en:'Contact | Yousra Mounib', ar:'تواصل | يسراء منيب'}
};
function getRoute(){
  const h = (location.hash || '#home').replace('#','');
  return PAGES.includes(h) ? h : 'home';
}
function renderRoute(isInitial){
  const route = getRoute();
  const tpl = document.getElementById('tpl-' + route);
  const main = document.getElementById('main-content');
  if (!tpl || !main) return;
  function paint(){
    if (route !== 'home') disposeHeroScene();
    main.innerHTML = tpl.innerHTML;
    window.setLang(window.__lang || 'en');
    if (route === 'home') {
      // requestAnimationFrame can fail to fire promptly in some environments/tabs —
      // initHeroScene() itself is guarded (no-op if already running), so a setTimeout
      // fallback alongside rAF guarantees the scene always starts rather than depending
      // on a single async callback that might never come.
      const tryInitHero = () => { if (getRoute() === 'home') initHeroScene(); };
      requestAnimationFrame(tryInitHero);
      setTimeout(tryInitHero, 120);
    }
    if (route === 'marketing') renderMarketing();
    if (route === 'projects') bindFeaturedTilt();
    bindContactForm();
    document.querySelectorAll('.nav-links a[href^="#"], .mobile-menu a[data-mm]').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + route);
    });
    const t = PAGE_TITLES[route] || PAGE_TITLES.home;
    document.title = t[window.__lang || 'en'];
    bindTimelineReveal();
    bindGsapReveals();
    window.scrollTo(0, 0);
    main.classList.remove('fading');
  }
  if (isInitial) { paint(); }
  else {
    main.classList.add('fading');
    setTimeout(paint, 180);
  }
}
window.addEventListener('hashchange', () => renderRoute(false));
renderRoute(true);
</script>
